{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="{% static 'initial_app/style.css' %}"/>
    <title>Todo List</title>
</head>
<body>
    <div id="wrapper">
        <h1>Todo List</h1>
        <input type="" id="task"><button id="add">Add Task</button>
        <div id="todos"></div>
    
        <ul>
            {% for init in todo_items %}            
            <li class="list-group-item">
                {{init.text}}
                <button id="0" class="remove">Delete</button>
            </li>
            {% endfor %}
        </ul>
    
 
    <script  src="{% static 'initial_app/app.js' %}"></script>
</body>
</html>
